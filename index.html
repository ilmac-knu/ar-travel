<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0;
      left: 0;
    }

    #arInfo {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 9999;
      text-align: center;
      width: 90%;
    }

    #title {
      background: rgba(0, 0, 0, 0.75);
      color: yellow;
      font-size: 26px;
      font-weight: bold;
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    #videoBtn {
      background: blue;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
    }
  </style>
</head>

<body>

  <div id="arInfo">
    <div id="title">뉴욕 자유의 여신상</div>
    <button id="videoBtn">영상 보기</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: targets.mind;" 
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const arInfo = document.getElementById("arInfo");
    const target = document.getElementById("target");
    const videoBtn = document.getElementById("videoBtn");

    target.addEventListener("targetFound", () => {
      arInfo.style.display = "block";
    });

    target.addEventListener("targetLost", () => {
      arInfo.style.display = "none";
    });

    videoBtn.addEventListener("click", () => {
      window.open("https://youtube.com/shorts/C7Yl5-dFYKw", "_blank");
    });
  </script>

</body>
</html>
