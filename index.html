<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0;
      left: 0;
      background: transparent !important;
    }

    canvas {
      background: transparent !important;
    }

    #startPanel {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0,0,0,0.88);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    #startBtn {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      background: #064ff0;
      color: white;
    }

    #guide {
      display: none;
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      text-align: center;
      width: 86%;
    }

    #arInfo {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 9999;
      text-align: center;
      width: 90%;
    }

    #title {
      color: yellow;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 14px;
      text-shadow: 3px 3px 5px black;
    }

    #videoBtn {
      background: #064ff0;
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 14px;
      border: none;
    }
  </style>
</head>

<body>

  <div id="startPanel">
    <div style="font-size:24px; font-weight:bold;">AR 자유의 여신상 체험</div>
    <div style="margin-top:14px; font-size:17px; line-height:1.5;">
      버튼을 누르면 카메라가 실행됩니다.<br>
      이후 자유의 여신상 이미지를 비춰보세요.
    </div>
    <button id="startBtn">AR 시작하기</button>
  </div>

  <div id="guide">자유의 여신상 이미지를 비춰보세요</div>

  <div id="arInfo">
    <div id="title">뉴욕 자유의 여신상</div>
    <button id="videoBtn">영상 보기</button>
  </div>

  <a-scene 
    id="scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;" 
    embedded
    renderer="alpha: true; colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>
  </a-scene>

  <script>
    const startPanel = document.getElementById("startPanel");
    const startBtn = document.getElementById("startBtn");
    const arInfo = document.getElementById("arInfo");
    const guide = document.getElementById("guide");
    const target = document.getElementById("target");
    const videoBtn = document.getElementById("videoBtn");
    const sceneEl = document.getElementById("scene");

    function stopAR() {
      try {
        if (sceneEl && sceneEl.systems && sceneEl.systems["mindar-image-system"]) {
          sceneEl.systems["mindar-image-system"].stop();
        }
      } catch (e) {}

      try {
        document.querySelectorAll("video").forEach(video => {
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
          }
        });
      } catch (e) {}
    }

    startBtn.addEventListener("click", async () => {
      startPanel.style.display = "none";
      guide.style.display = "block";

      try {
        await sceneEl.systems["mindar-image-system"].start();
      } catch (e) {
        alert("AR 실행이 지연되고 있습니다. 새로고침 후 다시 시도해 주세요.");
      }
    });

    target.addEventListener("targetFound", () => {
      arInfo.style.display = "block";
      guide.style.display = "none";
    });

    target.addEventListener("targetLost", () => {
      arInfo.style.display = "none";
      guide.style.display = "block";
    });

    videoBtn.addEventListener("click", () => {
      stopAR();
      window.location.href = "https://youtube.com/shorts/C7Yl5-dFYKw";
    });

    window.addEventListener("beforeunload", stopAR);
    window.addEventListener("pagehide", stopAR);
  </script>

</body>
</html>
