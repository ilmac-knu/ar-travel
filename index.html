<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
</head>

<body>
<a-scene mindar-image="imageTargetSrc: targets.mind;" embedded color-space="sRGB">
  
  <a-assets>
    <img id="card" src="statue.png">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    
    <!-- 텍스트 -->
    <a-text value="🗽 뉴욕 자유의 여신상"
            color="yellow"
            position="0 0.5 0"
            align="center">
    </a-text>

    <!-- 버튼 -->
    <a-plane color="blue"
             position="0 -0.5 0"
             width="1"
             height="0.3"
             onclick="window.open('https://youtube.com/shorts/C7Yl5-dFYKw')">
    </a-plane>

    <a-text value="영상 보기"
            color="white"
            position="0 -0.5 0.1"
            align="center">
    </a-text>

  </a-entity>

</a-scene>
</body>
</html>
