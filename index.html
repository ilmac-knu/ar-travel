<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
      position: fixed !important;
      top: 0;
      left: 0;
    }

    #arInfo {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 9999;
      text-align: center;
      width: 90%;
    }

    #title {
      background: rgba(0, 0, 0, 0.78);
      color: yellow;
      font-size: 26px;
      font-weight: bold;
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    #videoBtn {
      background: #064ff0;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
    }

    #guide {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      text-align: center;
      width: 86%;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div id="guide">
    자유의 여신상 이미지를 비춰보세요
  </div>

  <div id="arInfo">
    <div id="title">뉴욕 자유의 여신상</div>
    <button id="videoBtn">영상 보기</button>
  </div>

  <a-scene 
    id="scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0"></a-entity>

  </a-scene>

  <script>
    const arInfo = document.getElementById("arInfo");
    const guide = document.getElementById("guide");
    const target = document.getElementById("target");
    const videoBtn = document.getElementById("videoBtn");
    const sceneEl = document.getElementById("scene");

    function stopAR() {
      try {
        if (sceneEl && sceneEl.systems && sceneEl.systems["mindar-image-system"]) {
          sceneEl.systems["mindar-image-system"].stop();
        }
      } catch (e) {
        console.log("AR stop skipped:", e);
      }

      try {
        const videos = document.querySelectorAll("video");
        videos.forEach(video => {
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
          }
        });
      } catch (e) {
        console.log("Camera stop skipped:", e);
      }
    }

    target.addEventListener("targetFound", () => {
      arInfo.style.display = "block";
      guide.style.display = "none";
    });

    target.addEventListener("targetLost", () => {
      arInfo.style.display = "none";
      guide.style.display = "block";
    });

    videoBtn.addEventListener("click", () => {
      stopAR();
      window.location.href = "https://youtube.com/shorts/C7Yl5-dFYKw";
    });

    window.addEventListener("beforeunload", () => {
      stopAR();
    });

    window.addEventListener("pagehide", () => {
      stopAR();
    });
  </script>

</body>
</html>
